<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Directory | Jack Brown</title>
    <style>
        :root { --bg: #ffffff; --text: #1d1d1f; --muted: #67676e; --acc: #0071e3; --card: #f5f5f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 4rem 2rem; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 2rem; letter-spacing: -1px; margin-bottom: 2rem; }
        
        #project-list { display: grid; gap: 12px; }
        .project-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem; background: var(--card); border-radius: 16px;
            text-decoration: none; color: inherit; font-weight: 600;
            transition: 0.2s ease;
        }
        .project-item:hover { background: #eef0f2; transform: translateX(5px); }
        .project-item span { color: var(--acc); font-size: 0.9rem; }
        
        .loading { color: var(--muted); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <a href="/" style="text-decoration: none; color: var(--muted); font-size: 0.9rem;">← Back to Home</a>
    <h1>Project Directory</h1>
    
    <div id="project-list">
        <div class="loading">Scanning repository for projects...</div>
    </div>
</div>

<script>
    const GITHUB_USER = 'null65';
    const REPO_NAME = 'jackbrown.xyz'; 
    const FOLDER_PATH = 'projects';

    async function fetchProjects() {
        const listElement = document.getElementById('project-list');
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FOLDER_PATH}`);
            const data = await response.json();

            if (!Array.isArray(data)) throw new Error();

            listElement.innerHTML = ''; 

            data.forEach(item => {
                if (item.name !== 'index.html') {
                    const card = document.createElement('a');
                    card.className = 'project-item';
                    
                    const cleanName = item.name.split('.')[0].toUpperCase().replace(/-/g, ' ').replace(/_/g, ' ');
                    
                    card.href = `/${FOLDER_PATH}/${item.name}`;
                    card.innerHTML = `
                        ${cleanName}
                        <span>View Project →</span>
                    `;
                    listElement.appendChild(card);
                }
            });

            if (listElement.innerHTML === '') {
                listElement.innerHTML = '<p>No projects found.</p>';
            }
        } catch (error) {
            listElement.innerHTML = '<p style="color:red;">Error loading projects. Check repo name.</p>';
        }
    }

    fetchProjects();
</script>

</body>
</html>
